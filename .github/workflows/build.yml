name: Build mod zip

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read mod version from manifest
        id: meta
        run: |
          VERSION=$(jq -r '.version_number' mods-unpacked/BlackTriangle-FullAutoBot/manifest.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Mod version: ${VERSION}"

      - name: Build BlackTriangle-FullAutoBot.zip
        # Workshop ModLoader requires the zip top level to be
        # mods-unpacked/<author>-<modname>/... — do NOT cd into mods-unpacked.
        run: |
          zip -r BlackTriangle-FullAutoBot.zip mods-unpacked/BlackTriangle-FullAutoBot \
            -x "*.DS_Store" "*Thumbs.db" "*~" "*.swp"
          unzip -l BlackTriangle-FullAutoBot.zip | head -5
          unzip -l BlackTriangle-FullAutoBot.zip | tail -5

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlackTriangle-FullAutoBot-${{ steps.meta.outputs.version }}
          path: BlackTriangle-FullAutoBot.zip

      - name: Create GitHub Release on tag push
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: BlackTriangle-FullAutoBot.zip
          generate_release_notes: true
